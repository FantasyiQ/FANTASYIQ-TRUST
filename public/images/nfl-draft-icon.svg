<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 40"
  role="img"
  aria-label="Draft pick"
>
  <!-- Ticket background + border -->
  <g id="ticket">
    <!--
      Ticket shape: rounded rect with two small inward notches on the bottom edge.
      Path traces clockwise from top-left corner:
        - top edge (left arc → straight → right arc)
        - right edge (straight down)
        - bottom edge: right arc → straight → right notch (arc in) → straight → left notch (arc in) → straight → left arc
        - left edge (straight up)
      Notches are small semicircle cuts at x=20 and x=44, radius=3.
    -->
    <path
      d="
        M 6 2
        Q 2 2 2 6
        L 2 28
        Q 2 32 6 32
        L 17 32
        Q 17 29 20 29
        Q 23 29 23 32
        L 41 32
        Q 41 29 44 29
        Q 47 29 47 32
        L 58 32
        Q 62 32 62 28
        L 62 6
        Q 62 2 58 2
        Z
      "
      fill="#020617"
      stroke="#FACC15"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Stars and DRAFT text -->
  <g id="label">
    <!-- Left star at ~(13, 17), 5-point, radius ~4 -->
    <polygon
      points="
        13,12.5
        14.18,16.09
        17.97,16.09
        14.9,18.32
        16.07,21.91
        13,19.68
        9.93,21.91
        11.1,18.32
        8.03,16.09
        11.82,16.09
      "
      fill="#FACC15"
    />

    <!-- DRAFT text, centered -->
    <text
      x="32"
      y="21"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="9"
      font-weight="700"
      letter-spacing="1.5"
      fill="#E5E7EB"
    >DRAFT</text>

    <!-- Right star at ~(51, 17), 5-point, radius ~4 -->
    <polygon
      points="
        51,12.5
        52.18,16.09
        55.97,16.09
        52.9,18.32
        54.07,21.91
        51,19.68
        47.93,21.91
        49.1,18.32
        46.03,16.09
        49.82,16.09
      "
      fill="#FACC15"
    />
  </g>
</svg>
